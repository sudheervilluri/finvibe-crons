name: Daily Stock History Backfill

on:
  schedule:
    # Run at 12:20 AM IST daily (18:50 UTC previous day)
    - cron: '50 18 * * *'
  workflow_dispatch:

jobs:
  backfill-stock-history:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
        with:
          repository: sudheervilluri/pftracker
          token: ${{ secrets.GH_PAT }}
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Install dependencies
        run: npm ci
      - name: Run Stock History Backfill
        env:
          MONGODB_URI: ${{ secrets.MONGODB_URI }}
          MONGODB_STOCK_HISTORY_URI: ${{ secrets.MONGODB_STOCK_HISTORY_URI }}
          NEXTAUTH_SECRET: ${{ secrets.NEXTAUTH_SECRET }}
          DAYS: '2'
          CONCURRENCY: '8'
          WRITE_BATCH_SIZE: '20'
          INCLUDE_INDICES: 'true'
        run: |
          echo "📈 Starting daily stock history backfill..."
          npm run stock-history-backfill
          echo "✅ Stock history backfill completed successfully"
